spring:
  application:
    name: bd-ecommerce

  profiles:
    active: dev

  # Cache (Simple in-memory - Redis will be configured later)
  cache:
    type: simple

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 100

  # PostgreSQL (Supabase)
  datasource:
    url: jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:6543/postgres?prepareThreshold=0
    username: postgres.dsbkxohoqjmrpbetbzyi
    password: Abbuammu6190
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000

  # Mail (disabled for now)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Servlet
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Server
server:
  port: 8080
  servlet:
    context-path: /api

# JWT
jwt:
  secret: bdecommerce-jwt-secret-key-production-ready-256-bit-minimum-length-key-2024
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

# Cloudinary
cloudinary:
  cloud-name: dvjyqpdhx
  api-key: "853821928465848"
  api-secret: 6_LsLh03G0xdMhFDHtoQgw6M90A

# App Config
app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001
  admin:
    default-email: admin@bdecommerce.com
    default-password: Admin@123

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false

# Logging
logging:
  level:
    com.ecommerce.backend: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
